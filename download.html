<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#dfff00" />
  <meta
    name="description"
    content="Baixe o Colaí App para gerenciar albuns e figurinhas no iPhone ou Android."
  />
  <title>Baixar Colaí App</title>
  <style>
    :root {
      --ink: #07150c;
      --muted: #62716d;
      --green: #064c2e;
      --lime: #c8ff00;
      --yellow: #fff51f;
      --surface: #ffffff;
      --shadow: 0 24px 70px rgba(3, 36, 21, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      align-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 26rem),
        linear-gradient(160deg, var(--lime) 0%, var(--yellow) 72%);
      color: var(--ink);
      display: flex;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      line-height: 1.4;
      margin: 0;
      min-height: 100vh;
      padding: 22px;
    }

    a {
      color: inherit;
    }

    .phone {
      background: #0b0d0c;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 48px;
      box-shadow: var(--shadow);
      max-width: 390px;
      padding: 10px;
      width: min(100%, 390px);
    }

    .screen {
      background:
        radial-gradient(circle at 52% 34%, rgba(255, 255, 255, 0.7), transparent 7rem),
        linear-gradient(170deg, var(--lime) 0%, var(--yellow) 78%);
      border-radius: 39px;
      min-height: 760px;
      overflow: hidden;
      padding: 18px 22px 22px;
      position: relative;
    }

    .status {
      align-items: center;
      display: flex;
      font-size: 12px;
      font-weight: 800;
      justify-content: space-between;
      margin: 0 auto 28px;
      max-width: 288px;
    }

    .camera {
      background: #050607;
      border-radius: 999px;
      height: 27px;
      left: 50%;
      position: absolute;
      top: 15px;
      transform: translateX(-50%);
      width: 90px;
    }

    .icons {
      align-items: center;
      display: flex;
      gap: 5px;
    }

    .signal,
    .wifi,
    .battery {
      background: #050607;
      display: block;
    }

    .signal {
      border-radius: 1px;
      height: 8px;
      width: 13px;
    }

    .wifi {
      border-radius: 50% 50% 0 0;
      height: 8px;
      width: 12px;
    }

    .battery {
      border-radius: 3px;
      height: 8px;
      position: relative;
      width: 18px;
    }

    .battery::after {
      background: #050607;
      border-radius: 0 2px 2px 0;
      content: "";
      height: 4px;
      position: absolute;
      right: -3px;
      top: 2px;
      width: 2px;
    }

    .brand {
      text-align: center;
    }

    h1 {
      font-size: clamp(26px, 7vw, 32px);
      letter-spacing: 0;
      line-height: 1.05;
      margin: 0 0 14px;
    }

    .maker {
      font-size: 15px;
      margin: 0;
    }

    .app-icon {
      border-radius: 26px;
      box-shadow: 0 16px 38px rgba(6, 76, 46, 0.36);
      display: block;
      height: 104px;
      margin: 18px auto -52px;
      position: relative;
      width: 104px;
      z-index: 2;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 10px;
      margin-top: 0;
      padding: 86px 24px 28px;
      text-align: center;
    }

    .tagline {
      color: var(--muted);
      font-size: 20px;
      line-height: 1.45;
      margin: 0 auto 20px;
      max-width: 245px;
    }

    .stores {
      display: grid;
      gap: 13px;
      justify-items: center;
    }

    .store-button {
      align-items: center;
      background: #000;
      border-radius: 999px;
      color: #fff;
      display: grid;
      gap: 12px;
      grid-template-columns: 32px 1fr;
      min-height: 61px;
      padding: 8px 21px;
      text-align: left;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease;
      width: min(100%, 236px);
    }

    .store-button:focus-visible,
    .store-button:hover {
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      outline: 3px solid rgba(6, 76, 46, 0.28);
      transform: translateY(-1px);
    }

    .store-icon {
      display: block;
      height: 32px;
      width: 32px;
    }

    .store-copy {
      display: grid;
      gap: 1px;
    }

    .store-kicker {
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .store-name {
      font-size: 18px;
      font-weight: 850;
      line-height: 1.08;
    }

    .footer-links {
      bottom: 35px;
      color: rgba(7, 21, 12, 0.64);
      display: flex;
      font-size: 12px;
      gap: 12px;
      justify-content: center;
      left: 22px;
      position: absolute;
      right: 22px;
    }

    .home-indicator {
      background: #050607;
      border-radius: 999px;
      bottom: 15px;
      height: 5px;
      left: 50%;
      position: absolute;
      transform: translateX(-50%);
      width: 135px;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
      }

      .phone {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        max-width: none;
        padding: 0;
        width: 100%;
      }

      .screen {
        border-radius: 0;
        min-height: 100vh;
        padding-top: max(18px, env(safe-area-inset-top));
      }
    }

    @media (max-height: 720px) {
      .screen {
        min-height: 680px;
      }

      .footer-links {
        position: static;
        margin-top: 22px;
      }

      .home-indicator {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Landing page do Colaí App">
    <section class="screen">
      <div class="camera" aria-hidden="true"></div>
      <div class="status" aria-hidden="true">
        <span>9:41</span>
        <span class="icons">
          <span class="signal"></span>
          <span class="wifi"></span>
          <span class="battery"></span>
        </span>
      </div>

      <div class="brand">
        <h1>Colaí App</h1>
        <p class="maker">SuNi Group</p>
        <img class="app-icon" src="assets/app-icon.png" alt="Ícone do Colaí App" />
      </div>

      <div class="card">
        <p class="tagline">Seu novo gerenciador de Álbuns e Figurinhas!</p>

        <div class="stores">
          <a
            class="store-button"
            href="https://apps.apple.com/us/app/cola%C3%AD-app/id6772363197"
            aria-label="Baixar Colaí App na App Store"
          >
            <svg class="store-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#fff" d="M17.05 12.47c-.02-2.16 1.77-3.2 1.85-3.25-1.01-1.48-2.58-1.68-3.13-1.7-1.33-.14-2.59.78-3.26.78-.68 0-1.72-.76-2.83-.74-1.45.02-2.79.84-3.54 2.14-1.51 2.62-.39 6.49 1.08 8.62.72 1.04 1.58 2.2 2.7 2.16 1.08-.04 1.49-.7 2.8-.7 1.3 0 1.68.7 2.82.68 1.17-.02 1.91-1.06 2.62-2.1.83-1.21 1.17-2.38 1.19-2.44-.03-.01-2.27-.87-2.3-3.45ZM14.9 6.13c.6-.72 1-1.72.89-2.72-.86.03-1.9.57-2.52 1.29-.55.64-1.04 1.66-.91 2.64.96.07 1.94-.49 2.54-1.21Z" />
            </svg>
            <span class="store-copy">
              <span class="store-kicker">Download on the</span>
              <span class="store-name">App Store</span>
            </span>
          </a>

          <a
            class="store-button"
            href="https://play.google.com/store/apps/details?id=br.com.colai.app"
            aria-label="Baixar Colaí App no Google Play"
          >
            <svg class="store-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#fff" d="M4.36 3.31c-.22.24-.36.61-.36 1.1v15.18c0 .49.14.86.36 1.1l.07.06L12.93 12v-.2L4.43 3.25l-.07.06Z" />
              <path fill="#fff" d="m15.77 15.01-2.84-2.86v-.3l2.84-2.86.06.03 3.36 1.91c.96.55.96 1.45 0 2l-3.36 1.91-.06.17Z" opacity=".9" />
              <path fill="#fff" d="m15.83 14.84-2.9-2.92-8.57 8.77c.35.37.91.41 1.55.05l9.92-5.9Z" opacity=".78" />
              <path fill="#fff" d="M15.83 9.16 5.91 3.26c-.64-.36-1.2-.32-1.55.05l8.57 8.77 2.9-2.92Z" opacity=".78" />
            </svg>
            <span class="store-copy">
              <span class="store-kicker">Get it on</span>
              <span class="store-name">Google Play</span>
            </span>
          </a>
        </div>
      </div>

      <nav class="footer-links" aria-label="Links legais">
        <a href="privacy-policy.html">Privacidade</a>
        <a href="terms-of-use.html">Termos</a>
      </nav>
      <div class="home-indicator" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
