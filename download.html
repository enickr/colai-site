<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#dfff00" />
  <meta
    name="description"
    content="Baixe o Colai App para gerenciar albuns e figurinhas no iPhone ou Android."
  />
  <title>Baixar Colai App</title>
  <style>
    :root {
      --ink: #08150d;
      --muted: #5d6f68;
      --green: #064b2c;
      --green-soft: #e8f6ee;
      --lime: #ccff00;
      --yellow: #fff11f;
      --surface: #ffffff;
      --line: rgba(6, 75, 44, 0.14);
      --shadow: 0 22px 58px rgba(5, 54, 31, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--yellow);
      min-height: 100%;
      width: 100%;
    }

    body {
      background:
        radial-gradient(circle at 50% -8rem, rgba(255, 255, 255, 0.88), transparent 30rem),
        linear-gradient(160deg, var(--lime) 0%, var(--yellow) 68%, #fffad7 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px;
    }

    .hero {
      align-items: center;
      display: grid;
      flex: 1;
      justify-items: center;
      margin: 0 auto;
      max-width: 980px;
      padding: 34px 0 18px;
      width: 100%;
    }

    .download-panel {
      align-items: center;
      display: grid;
      gap: 28px;
      justify-items: center;
      max-width: 520px;
      padding: 22px 0 18px;
      text-align: center;
      width: 100%;
    }

    .app-icon {
      border-radius: 28px;
      box-shadow: 0 16px 34px rgba(6, 75, 44, 0.34);
      display: block;
      height: 118px;
      width: 118px;
    }

    .copy {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    h1 {
      font-size: clamp(36px, 10vw, 54px);
      letter-spacing: 0;
      line-height: 1;
      margin: 0;
      white-space: nowrap;
    }

    .maker {
      color: var(--green);
      font-size: 16px;
      font-weight: 750;
      margin: 0;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(18px, 5vw, 22px);
      line-height: 1.42;
      margin: 2px auto 0;
      max-width: 340px;
    }

    .stores {
      display: grid;
      gap: 14px;
      justify-items: center;
      width: 100%;
    }

    .store-button {
      align-items: center;
      background: #000;
      border-radius: 999px;
      color: #fff;
      display: grid;
      gap: 14px;
      grid-template-columns: 34px 1fr;
      min-height: 64px;
      padding: 9px 24px;
      text-align: left;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease;
      width: min(100%, 278px);
    }

    .store-button:focus-visible,
    .store-button:hover {
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      outline: 3px solid rgba(6, 75, 44, 0.24);
      transform: translateY(-1px);
    }

    .store-icon {
      display: block;
      height: 34px;
      width: 34px;
    }

    .store-copy {
      display: grid;
      gap: 1px;
    }

    .store-kicker {
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .store-name {
      font-size: 19px;
      font-weight: 850;
      line-height: 1.08;
    }

    .support-strip {
      align-items: center;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--green);
      display: flex;
      flex-wrap: wrap;
      font-size: 14px;
      font-weight: 650;
      gap: 10px;
      justify-content: center;
      padding: 12px 14px;
      width: 100%;
    }

    .support-strip a {
      text-decoration-color: rgba(6, 75, 44, 0.38);
      text-underline-offset: 3px;
    }

    .footer {
      color: rgba(8, 21, 13, 0.66);
      display: flex;
      flex-wrap: wrap;
      font-size: 13px;
      gap: 12px;
      justify-content: center;
      padding: 14px 0 0;
      text-align: center;
      white-space: nowrap;
    }

    @media (min-width: 760px) {
      .page {
        padding: 36px;
      }

      .hero {
        padding-top: 46px;
      }

      .download-panel {
        max-width: 680px;
        padding: 42px 0;
      }

      .app-icon {
        height: 136px;
        width: 136px;
      }

      .stores {
        grid-template-columns: repeat(2, minmax(0, 278px));
        justify-content: center;
      }
    }

    @media (max-width: 360px) {
      .page {
        padding: 18px;
      }

      .download-panel {
        padding: 18px 0 12px;
      }

      .store-button {
        gap: 12px;
        padding-inline: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Baixar Colai App">
      <div class="download-panel">
        <img class="app-icon" src="assets/app-icon.png" alt="Icone do Colai App" />

        <div class="copy">
          <h1>Cola&iacute; App</h1>
          <p class="maker">SuNi Group</p>
          <p class="tagline">Seu novo gerenciador de &Aacute;lbuns e Figurinhas!</p>
        </div>

        <div class="stores">
          <a
            class="store-button"
            href="https://apps.apple.com/us/app/cola%C3%AD-app/id6772363197"
            aria-label="Baixar Colai App na App Store"
          >
            <svg class="store-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#fff" d="M17.05 12.47c-.02-2.16 1.77-3.2 1.85-3.25-1.01-1.48-2.58-1.68-3.13-1.7-1.33-.14-2.59.78-3.26.78-.68 0-1.72-.76-2.83-.74-1.45.02-2.79.84-3.54 2.14-1.51 2.62-.39 6.49 1.08 8.62.72 1.04 1.58 2.2 2.7 2.16 1.08-.04 1.49-.7 2.8-.7 1.3 0 1.68.7 2.82.68 1.17-.02 1.91-1.06 2.62-2.1.83-1.21 1.17-2.38 1.19-2.44-.03-.01-2.27-.87-2.3-3.45ZM14.9 6.13c.6-.72 1-1.72.89-2.72-.86.03-1.9.57-2.52 1.29-.55.64-1.04 1.66-.91 2.64.96.07 1.94-.49 2.54-1.21Z" />
            </svg>
            <span class="store-copy">
              <span class="store-kicker">Download on the</span>
              <span class="store-name">App Store</span>
            </span>
          </a>

          <a
            class="store-button"
            href="https://play.google.com/store/apps/details?id=br.com.colai.app"
            aria-label="Baixar Colai App no Google Play"
          >
            <svg class="store-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#fff" d="M4.36 3.31c-.22.24-.36.61-.36 1.1v15.18c0 .49.14.86.36 1.1l.07.06L12.93 12v-.2L4.43 3.25l-.07.06Z" />
              <path fill="#fff" d="m15.77 15.01-2.84-2.86v-.3l2.84-2.86.06.03 3.36 1.91c.96.55.96 1.45 0 2l-3.36 1.91-.06.17Z" opacity=".9" />
              <path fill="#fff" d="m15.83 14.84-2.9-2.92-8.57 8.77c.35.37.91.41 1.55.05l9.92-5.9Z" opacity=".78" />
              <path fill="#fff" d="M15.83 9.16 5.91 3.26c-.64-.36-1.2-.32-1.55.05l8.57 8.77 2.9-2.92Z" opacity=".78" />
            </svg>
            <span class="store-copy">
              <span class="store-kicker">Get it on</span>
              <span class="store-name">Google Play</span>
            </span>
          </a>
        </div>

        <nav class="support-strip" aria-label="Links legais">
          <a href="privacy-policy.html">Privacidade</a>
          <span aria-hidden="true">|</span>
          <a href="terms-of-use.html">Termos de Uso</a>
        </nav>
      </div>
    </section>

    <footer class="footer">
      <span>&copy; 2026 SuNi Group</span>
    </footer>
  </main>
</body>
</html>
